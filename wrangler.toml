# Cloudflare Pages configuration
name = "spd-matrix"
pages_build_output_dir = "."
compatibility_date = "2024-11-28"
compatibility_flags = ["nodejs_compat"]

# IMPORTANT: Dashboard bindings do NOT work for Pages Functions.
# These must be in wrangler.toml. For multi-tenant deploys, the deploy
# process temporarily swaps these IDs before running `wrangler pages deploy`.
#
# Production (spd-matrix) values below. See INSTANCE-DEPLOY.md for
# the deploy-time swap process used for other instances.

# Hyperdrive binding for Railway PostgreSQL
[[hyperdrive]]
binding = "DB"
id = "158d316aa903469cb2034df36a03b32a"

# R2 bucket for persistent document storage
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "spd-matrix-documents"
